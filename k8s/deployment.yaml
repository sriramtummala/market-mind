apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketmind-api
  labels:
    app: marketmind-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: marketmind-api
  template:
    metadata:
      labels:
        app: marketmind-api
    spec:
      containers:
        - name: marketmind-api
          image: marketmind:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: marketmind-secrets
                  key: anthropic-api-key
                  optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
